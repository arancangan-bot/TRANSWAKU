<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>Jamkot | Dashboard Antrian - Lapas Cikarang</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: "Segoe UI", system-ui;
        min-height: 100vh;
        padding: 30px 20px;
        background-image: url("background.png");
        background-size: cover;
        background-position: center;
        background-color: #1e3c4a;
      }
      .main-container {
        max-width: 1300px;
        margin: 0 auto;
        background: rgba(255, 255, 255, 0.94);
        border-radius: 2rem;
        padding: 25px 30px 35px;
        box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
        transition: all 0.3s;
      }
      .main-container.fullscreen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        border-radius: 0;
        overflow-y: auto;
        z-index: 9999;
      }
      .header-wrapper {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        border-bottom: 4px solid #facc15;
      }
      .logo-left, .logo-right { padding: 8px 16px; }
      .judul-utama { text-align: center; flex: 1; }
      .judul-utama h2 { text-shadow: 2px 2px 5px black; color: #ffe484; }
      .logo-left img, .logo-right img { height: 90px; object-fit: contain; }
      .toolbar-area {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 15px;
        margin: 25px 0 20px;
      }
      button {
        padding: 12px 28px;
        border-radius: 40px;
        font-weight: 600;
        border: none;
        background: #1e466e;
        color: white;
        cursor: pointer;
        transition: 0.2s;
      }
      button:hover { transform: translateY(-2px); filter: brightness(1.05); }
      .btn-input-page { background: #2a7f62; }
      .btn-repeat-last { background: #2d5f3e; }
      .btn-fullscreen { background: #6b21a5; }
      .table-wrapper {
        overflow-x: auto;
        max-height: 520px;
        border: 1px solid #ccc;
        border-radius: 1rem;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: white;
      }
      th {
        background: #1e3c4a;
        color: white;
        padding: 14px;
        position: sticky;
        top: 0;
      }
      td { padding: 12px 8px; border-bottom: 1px solid #e2e8f0; transition: background 0.2s; }
      .merah {
        background: #fee2e2;
        color: #dc2626;
        border-radius: 40px;
        padding: 4px 12px;
        display: inline-block;
      }
      .hijau {
        background: #dcfce7;
        color: #0e7c32;
        border-radius: 40px;
        padding: 4px 12px;
        display: inline-block;
      }
      .baris-selesai {
        background-color: #ffdddd !important;
        animation: blinkWarning 1s ease-in-out 3;
      }
      @keyframes blinkWarning {
        0% { background-color: #ffdddd; }
        50% { background-color: #ffaaaa; }
        100% { background-color: #ffdddd; }
      }
      .btn-hapus-satu {
        background: #b91c1c;
        padding: 6px 18px;
        border-radius: 30px;
      }
      .hapus-semua-wrapper { text-align: center; margin-top: 20px; }
      .auto-refresh-badge {
        position: fixed;
        bottom: 15px;
        left: 15px;
        background: rgba(0, 0, 0, 0.7);
        color: #facc15;
        padding: 6px 14px;
        border-radius: 30px;
        font-size: 0.8rem;
        font-weight: bold;
        z-index: 999;
      }
      /* TOAST NOTIFICATION */
      .toast-notif {
        position: fixed;
        top: 20px;
        right: 20px;
        background: #b91c1c;
        color: white;
        padding: 16px 24px;
        border-radius: 60px;
        font-weight: bold;
        box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        z-index: 10000;
        display: flex;
        align-items: center;
        gap: 12px;
        animation: slideIn 0.3s ease-out;
        max-width: 400px;
        pointer-events: none;
      }
      @keyframes slideIn {
        from { transform: translateX(100%); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @media (max-width: 700px) {
        .logo-left img, .logo-right img { height: 60px; }
        button { padding: 8px 16px; font-size: 0.8rem; }
        .toast-notif { font-size: 0.85rem; padding: 12px 18px; right: 10px; left: 10px; max-width: none; }
      }
    </style>
  </head>
  <body>
    <div class="main-container" id="mainContainer">
      <div class="header-wrapper">
        <div class="logo-left"><img src="imipas.png" alt="Kemenimipas" onerror="this.style.display = 'none'" /></div>
        <div class="judul-utama">
          <h2>LAPAS KELAS IIA CIKARANG</h2>
          <h2>JAM MONITORING KUNJUNGAN TERPADU</h2>
          <h2>RANCANGAN AKTUALISASI RICKY MARTIN</h2>
        </div>
        <div class="logo-right"><img src="Pemasyarakatan.png" alt="Pemasyarakatan" onerror="this.style.display = 'none'" /></div>
      </div>
      <div class="toolbar-area">
        <button class="btn-input-page" onclick="window.location.href = 'input.html'">📝 Buka Halaman Input</button>
        <button class="btn-repeat-last" onclick="ulangiPanggilanTerakhir()">🔁 Ulangi Panggilan Terakhir</button>
        <button class="btn-fullscreen" onclick="toggleFullscreen()">🖥️ Full Layar</button>
      </div>
      <div class="table-wrapper">
        <table>
          <thead><tr><th>No. Antrian</th><th>Nama Pengunjung</th><th>Nama WBP</th><th>Status / Waktu</th><th>Aksi</th></tr></thead>
          <tbody id="tabelData"></tbody>
        </table>
      </div>
      <div class="hapus-semua-wrapper"><button onclick="hapusSemuaData()">🗑️ Hapus Semua Data</button></div>
    </div>
    <div class="auto-refresh-badge" id="refreshIndicator"></div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
      import { getFirestore, collection, onSnapshot, deleteDoc, doc, getDocs, serverTimestamp, setDoc, getDoc, updateDoc, Timestamp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBsos9OqujXvezT7YmVLzpCssyup9tBduc",
        authDomain: "ruang-kunjungan.firebaseapp.com",
        projectId: "ruang-kunjungan",
        storageBucket: "ruang-kunjungan.firebasestorage.app",
        messagingSenderId: "1070275298561",
        appId: "1:1070275298561:web:c74c42680e7fded17e8700",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      // ====================== GLOBAL ======================
      let daftarData = [];
      let panggilanTerakhir = null;
      let suaraPerempuan = null;
      let callQueue = [];
      let isProcessingQueue = false;
      let serverTimeOffset = 0;
      let isOffsetReady = false;

      // Untuk sinkronisasi "Ulangi Panggilan" antar device
      let lastRepeatTimestamp = 0;
      const repeatCallDocRef = doc(db, "global", "repeatCall");

      // NOTIFIKASI WAKTU HABIS (SELESAI)
      let notifiedCompletedIds = new Set();  // menyimpan id antrian yang sudah dinotifikasi SELESAI
      let audioCtx = null;                   // untuk beep suara
      
      // ====================== KALIBRASI SERVER TIME ======================
      async function calibrateServerTime() {
        const savedOffset = localStorage.getItem("serverTimeOffset");
        const savedTime = localStorage.getItem("serverTimeOffsetSavedAt");
        if (savedOffset && savedTime && (Date.now() - parseInt(savedTime) < 5 * 60 * 1000)) {
          serverTimeOffset = parseInt(savedOffset);
          isOffsetReady = true;
          console.log("✅ Pakai offset dari localStorage:", serverTimeOffset, "ms");
          return;
        }
        const samples = [];
        for (let i = 0; i < 5; i++) {
          try {
            const tempRef = doc(collection(db, "tempTime"));
            const before = Date.now();
            await setDoc(tempRef, { ping: serverTimestamp() });
            const snap = await getDoc(tempRef);
            const serverTime = snap.data().ping.toDate().getTime();
            const after = Date.now();
            const rtt = after - before;
            const clientTime = before + rtt / 2;
            const offset = serverTime - clientTime;
            samples.push(offset);
            await deleteDoc(tempRef);
          } catch (e) { console.warn("Ping gagal", e); }
          await new Promise(r => setTimeout(r, 100));
        }
        if (samples.length === 0) { serverTimeOffset = 0; isOffsetReady = true; return; }
        samples.sort((a, b) => a - b);
        serverTimeOffset = samples[Math.floor(samples.length / 2)];
        localStorage.setItem("serverTimeOffset", serverTimeOffset);
        localStorage.setItem("serverTimeOffsetSavedAt", Date.now());
        isOffsetReady = true;
        console.log("🔄 Kalibrasi selesai, offset median:", serverTimeOffset, "ms");
      }
      function getCurrentServerTime() { return Date.now() + serverTimeOffset; }
      setInterval(async () => { if (isOffsetReady) { await calibrateServerTime(); cekDanNotifikasiSelesai(); renderTabel(); } }, 30000);

      // ====================== SUARA UMUM ======================
      async function getSuaraPerempuan() {
        return new Promise((resolve) => {
          if (suaraPerempuan) { resolve(suaraPerempuan); return; }
          const cek = setInterval(() => {
            const voices = speechSynthesis.getVoices();
            if (voices.length) {
              clearInterval(cek);
              let preferred = voices.find(v => v.lang === "id-ID" && (v.name.toLowerCase().includes("female") || v.name.toLowerCase().includes("perempuan")));
              if (!preferred) preferred = voices.find(v => v.lang === "id-ID");
              if (!preferred) preferred = voices.find(v => v.lang.startsWith("id"));
              suaraPerempuan = preferred || voices[0];
              resolve(suaraPerempuan);
            }
          }, 100);
        });
      }

      // Fungsi untuk memainkan beep pendek (pakai Web Audio)
      async function playBeep() {
        try {
          if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          }
          // Jika audio context suspended, coba resume (bisa gagal tanpa interaksi user, tapi speech tetap jalan)
          if (audioCtx.state === 'suspended') {
            await audioCtx.resume();
          }
          const oscillator = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          oscillator.connect(gain);
          gain.connect(audioCtx.destination);
          oscillator.type = 'sine';
          oscillator.frequency.value = 880;
          gain.gain.value = 0.3;
          oscillator.start();
          gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.6);
          oscillator.stop(audioCtx.currentTime + 0.6);
        } catch (err) {
          console.warn("Beep tidak bisa diputar (mungkin perlu interaksi user):", err);
        }
      }

      // Pengumuman lisan khusus untuk waktu habis
      async function speakCompletion(nomor, nama, wbp) {
        const teks = `Perhatian. Waktu kunjungan untuk antrian nomor ${nomor}, pengunjung atas nama ${nama}, kunjungan untuk saudara ${wbp} telah habis. Silakan meninggalkan ruangan kunjungan. Terima kasih.`;
        const speech = new SpeechSynthesisUtterance(teks);
        speech.lang = "id-ID";
        speech.rate = 0.9;
        speech.pitch = 1.1;
        speech.voice = await getSuaraPerempuan();
        speechSynthesis.speak(speech);
      }

      // NOTIFIKASI VISUAL (toast + highlight baris)
      function showVisualNotification(nomor, nama, wbp, rowElement) {
        // Toast muncul
        const toast = document.createElement('div');
        toast.className = 'toast-notif';
        toast.innerHTML = `⏰ WAKTU HABIS! Antrian ${nomor} | ${nama} → ${wbp}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 5000);
        
        // Highlight baris
        if (rowElement) {
          rowElement.classList.add('baris-selesai');
          setTimeout(() => rowElement.classList.remove('baris-selesai'), 4000);
        }
      }

      // TRIGGER NOTIFIKASI LENGKAP (suara+beep+visual)
      async function triggerCompletionNotification(item, rowElement) {
        const nomor = item.nomor || '?';
        const nama = item.nama || 'pengunjung';
        const wbp = item.wbp || 'WBP';
        
        // Visual
        showVisualNotification(nomor, nama, wbp, rowElement);
        // Suara beep
        await playBeep();
        // Pengumuman lisan
        await speakCompletion(nomor, nama, wbp);
      }

      // ====================== CEK DAN NOTIFIKASI STATUS SELESAI ======================
      let notifInterval = null;
      function cekDanNotifikasiSelesai() {
        if (!isOffsetReady) return;
        const tbody = document.getElementById("tabelData");
        const rows = tbody.querySelectorAll("tr");
        // Buat map id ke row element
        const rowMap = new Map();
        rows.forEach(row => {
          const idAttr = row.getAttribute("data-id");
          if (idAttr) rowMap.set(idAttr, row);
        });
        
        for (const item of daftarData) {
          const status = hitungStatus(item);
          const isSelesai = (status.text === "✔️ SELESAI");
          
          if (isSelesai && !notifiedCompletedIds.has(item.id)) {
            // Belum pernah dinotifikasi -> kirim notifikasi sekarang
            notifiedCompletedIds.add(item.id);
            const rowEl = rowMap.get(item.id);
            triggerCompletionNotification(item, rowEl).catch(e => console.warn("Notif error:", e));
          } else if (!isSelesai && notifiedCompletedIds.has(item.id)) {
            // Jika status berubah dari selesai jadi belum selesai (misal edit durasi) -> reset notif
            notifiedCompletedIds.delete(item.id);
          }
        }
        
        // Bersihkan jika data dihapus
        const currentIds = new Set(daftarData.map(d => d.id));
        for (let id of notifiedCompletedIds) {
          if (!currentIds.has(id)) notifiedCompletedIds.delete(id);
        }
      }

      // Jalankan pengecekan tiap 2 detik
      setInterval(() => { cekDanNotifikasiSelesai(); }, 2000);

      // Fungsi status dengan perhitungan detail
      function hitungStatus(item) {
        if (!item.createdAt || typeof item.createdAt.toDate !== 'function') return { text: "⏳ Memuat...", class: "hijau" };
        const serverCreated = item.createdAt.toDate().getTime();
        const serverNow = getCurrentServerTime();
        let elapsed = (serverNow - serverCreated) / 1000;
        if (elapsed < 0) elapsed = 0;
        const persiapan = item.durasiPersiapan || 10;
        const kunjungan = item.durasiKunjungan || 300;
        if (elapsed < persiapan) {
          const sisa = persiapan - elapsed;
          return { text: `⏳ PERSIAPAN (${Math.ceil(sisa)}s)`, class: "hijau" };
        }
        const elapsedKunjungan = elapsed - persiapan;
        if (elapsedKunjungan < kunjungan) {
          const sisa = kunjungan - elapsedKunjungan;
          const menit = Math.floor(sisa / 60);
          const detik = Math.floor(sisa % 60);
          let textClass = "";
          if (sisa <= 10) textClass = "merah";
          return { text: `⏱️ ${menit.toString().padStart(2, '0')}:${detik.toString().padStart(2, '0')}`, class: textClass };
        }
        return { text: "✔️ SELESAI", class: "merah", selesai: true };
      }

      // ====================== RENDER TABEL ======================
      let renderRequestId = null;
      async function renderTabel() {
        if (!isOffsetReady) {
          document.getElementById("tabelData").innerHTML = '<tr><td colspan="5" style="text-align:center">⏳ Menyinkronkan waktu server...</td></tr>';
          return;
        }
        const tbody = document.getElementById("tabelData");
        tbody.innerHTML = "";
        const sortedData = [...daftarData].sort((a, b) => (b.nomor || 0) - (a.nomor || 0));
        for (const item of sortedData) {
          const status = hitungStatus(item);
          let nomorAntrian = item.nomor;
          if (!nomorAntrian || nomorAntrian === 0) nomorAntrian = "—";
          
          const row = tbody.insertRow();
          row.setAttribute("data-id", item.id);
          row.insertCell(0).innerText = nomorAntrian;
          row.insertCell(1).innerText = escapeHtml(item.nama);
          row.insertCell(2).innerText = escapeHtml(item.wbp);
          const statusCell = row.insertCell(3);
          statusCell.innerHTML = `<span class="${status.class}">${status.text}</span>`;
          const actionCell = row.insertCell(4);
          const hapusBtn = document.createElement("button");
          hapusBtn.innerText = "🗑 Hapus";
          hapusBtn.className = "btn-hapus-satu";
          hapusBtn.onclick = (function(id) { return function() { hapusData(id); }; })(item.id);
          actionCell.appendChild(hapusBtn);
          
          // Jika status selesai dan belum ter-notifikasi, tapi baru saja di-render (case add dari device lain)
          if (status.text === "✔️ SELESAI" && !notifiedCompletedIds.has(item.id)) {
            // Langsung notifikasi tanpa delay (tapi tidak double karena cek akan handle juga)
            // Tambahkan ke set agar tidak double trigger di interval berikutnya
            notifiedCompletedIds.add(item.id);
            triggerCompletionNotification(item, row).catch(e => console.warn(e));
          }
        }
        if (renderRequestId) cancelAnimationFrame(renderRequestId);
        renderRequestId = requestAnimationFrame(() => { setTimeout(() => renderTabel(), 500); });
      }
      
      function escapeHtml(str) { if (!str) return ""; return str.replace(/[&<>]/g, m => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;" })[m]); }

      // ====================== HAPUS DATA ======================
      window.hapusData = async function (id) {
        if (!confirm("Hapus antrian ini?")) return;
        await deleteDoc(doc(db, "antrian", id));
        // Hapus dari set notifikasi jika ada
        notifiedCompletedIds.delete(id);
      };
      
      window.hapusSemuaData = async function () {
        if (!confirm("⚠️ Hapus SEMUA antrian? Counter akan direset ke 0, antrian berikutnya mulai dari nomor 1")) return;
        const snapshot = await getDocs(collection(db, "antrian"));
        const promises = [];
        snapshot.forEach(d => promises.push(deleteDoc(doc(db, "antrian", d.id))));
        await Promise.all(promises);
        const counterRef = doc(db, "counter", "antrianCounter");
        await setDoc(counterRef, { value: 0 });
        notifiedCompletedIds.clear();
      };

      // ====================== ULANGI PANGGILAN (MANUAL) ======================
      async function playSuaraManual(nomor, nama, wbp) {
        const teks = `Mohon Perhatian. Nomor antrian ${nomor}, Pengunjung atas nama ${nama}, kunjungan untuk Saudara ${wbp}, waktu kunjungan telah habis. Silakan meninggalkan ruangan kunjungan. Terima kasih.`;
        const speech = new SpeechSynthesisUtterance(teks);
        speech.lang = "id-ID";
        speech.rate = 0.9;
        speech.pitch = 1.15;
        speech.voice = await getSuaraPerempuan();
        speechSynthesis.speak(speech);
      }
      function putarBacksound() {
        const audio = new Audio("backsound.mpeg");
        audio.play().catch(e => console.warn("Gagal putar backsound:", e));
      }
      async function panggilSekaliManual(nomor, nama, wbp) {
        putarBacksound();
        await new Promise(resolve => setTimeout(resolve, 3000));
        await playSuaraManual(nomor, nama, wbp);
      }
      function addToQueue(fn, ...args) {
        callQueue.push(() => fn(...args));
        processQueue();
      }
      async function processQueue() {
        if (isProcessingQueue) return;
        isProcessingQueue = true;
        while (callQueue.length > 0) {
          const task = callQueue.shift();
          try { await task(); } catch (err) { console.error(err); }
          await new Promise(resolve => setTimeout(resolve, 500));
        }
        isProcessingQueue = false;
      }
      
      window.ulangiPanggilanTerakhir = async function () {
        if (!panggilanTerakhir) {
          console.warn("Tidak ada panggilan terakhir untuk diulang.");
          return;
        }
        const nowServer = Timestamp.now();
        await setDoc(repeatCallDocRef, {
          nomor: panggilanTerakhir.nomor,
          nama: panggilanTerakhir.nama,
          wbp: panggilanTerakhir.wbp,
          timestamp: nowServer,
          updatedAt: serverTimestamp()
        }, { merge: true });
        console.log("Perintah ulang panggilan dikirim ke Firestore");
      };

      function listenRepeatCall() {
        onSnapshot(repeatCallDocRef, (docSnap) => {
          if (docSnap.exists()) {
            const data = docSnap.data();
            const newTimestamp = data.timestamp?.toDate?.()?.getTime() || 0;
            const now = Date.now();
            if (newTimestamp > lastRepeatTimestamp && (now - newTimestamp) < 10000) {
              lastRepeatTimestamp = newTimestamp;
              const { nomor, nama, wbp } = data;
              if (nomor && nama && wbp) {
                console.log(`📢 Menerima perintah ulang panggilan: nomor ${nomor}`);
                addToQueue(panggilSekaliManual, nomor, nama, wbp);
              }
            }
          }
        });
      }

      // ====================== FULLSCREEN ======================
      window.toggleFullscreen = function () {
        document.getElementById("mainContainer").classList.toggle("fullscreen");
      };

      // ====================== FIRESTORE LISTENER (ANTRIAN) ======================
      onSnapshot(collection(db, "antrian"), (snapshot) => {
        const newData = [];
        snapshot.forEach(doc => newData.push({ id: doc.id, ...doc.data() }));
        daftarData = newData;
        if (newData.length > 0) {
          const maxNomor = Math.max(...newData.map(d => d.nomor || 0));
          const lastItem = newData.find(d => d.nomor === maxNomor);
          if (lastItem) {
            panggilanTerakhir = { nomor: lastItem.nomor, nama: lastItem.nama, wbp: lastItem.wbp };
          }
        } else {
          panggilanTerakhir = null;
        }
        renderTabel();
        cekDanNotifikasiSelesai(); // langsung cek notifikasi saat ada perubahan data
      });

      // ====================== INIT ======================
      window.onload = async function () {
        await calibrateServerTime();
        await getSuaraPerempuan();
        lastRepeatTimestamp = Date.now();
        document.getElementById("refreshIndicator").innerHTML = "🔄 Realtime + Notifikasi waktu habis (visual, beep, suara)";
        listenRepeatCall();
        renderTabel();
        // Inisialisasi AudioContext untuk beep (belum di-resume, tetapi nanti coba resume ketika notifikasi)
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        // Event listener untuk mengaktifkan audio setelah user klik pertama di mana saja (agar beep bisa jalan)
        const resumeAudio = () => {
          if (audioCtx && audioCtx.state === 'suspended') {
            audioCtx.resume().then(() => console.log("AudioContext aktif setelah user gesture"));
          }
          document.removeEventListener('click', resumeAudio);
          document.removeEventListener('touchstart', resumeAudio);
        };
        document.addEventListener('click', resumeAudio);
        document.addEventListener('touchstart', resumeAudio);
      };
    </script>
  </body>
</html>
