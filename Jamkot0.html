<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Jamkot | Dashboard Antrian - Lapas Cikarang (Sinkron Waktu Akurat)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      min-height: 100vh;
      padding: 30px 20px;
      background-image: url("background.png");
      background-size: cover;
      background-position: center;
      background-color: #1e3c4a;
    }
    .main-container {
      max-width: 1400px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.96);
      border-radius: 2rem;
      padding: 25px 30px 35px;
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
    }
    .header-wrapper {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      border-bottom: 4px solid #facc15;
      background-image: url('background.png');
      background-size: cover;
      border-radius: 24px 24px 0 0;
    }
    .logo-left, .logo-right { padding: 8px 0; }
    .logo-left { margin-left: 0.5cm; }
    .logo-right { margin-right: 0.5cm; }
    .logo-left img, .logo-right img { height: 90px; object-fit: contain; }
    .judul-utama { text-align: center; flex: 1; }
    .judul-utama h2 { text-shadow: 2px 2px 5px rgba(0,0,0,0.5); color: #ffe484; font-weight: 700; }
    .floating-input-btn {
      position: fixed; bottom: 35px; right: 35px;
      background: #2a7f62; color: white; padding: 8px 16px; border-radius: 40px;
      font-size: 0.85rem; font-weight: bold; text-decoration: none;
      display: flex; align-items: center; gap: 6px; box-shadow: 0 3px 10px rgba(0,0,0,0.3);
      z-index: 1000; cursor: pointer;
    }
    .table-wrapper { overflow-x: auto; max-height: 560px; border: 1px solid #cfdee9; border-radius: 1.25rem; }
    table { width: 100%; border-collapse: collapse; background: white; font-size: 0.95rem; }
    th { background: #1e3c4a; color: white; padding: 14px 12px; position: sticky; top: 0; }
    td { padding: 12px 8px; border-bottom: 1px solid #e2edf2; }
    .merah { background: #fee2e2; color: #dc2626; border-radius: 40px; padding: 5px 14px; display: inline-block; font-weight: 600; }
    .hijau { background: #dcfce7; color: #0e7c32; border-radius: 40px; padding: 5px 14px; }
    .btn-hapus-satu { background: #b91c1c; padding: 6px 18px; border-radius: 30px; border: none; cursor: pointer; color: white; font-weight: 600; }
    .btn-ulang-panggilan { background: #0f5c6e; padding: 6px 18px; border-radius: 30px; border: none; cursor: pointer; color: white; }
    .aksi-container { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .hapus-semua-wrapper { text-align: center; margin-top: 24px; }
    .hapus-semua-wrapper button { background: #9b2c2c; padding: 12px 32px; border-radius: 40px; color: white; font-weight: bold; border: none; cursor: pointer; }
    .fullscreen-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.96); backdrop-filter: blur(4px); z-index: 30000;
      display: flex; align-items: center; justify-content: center; text-align: center;
      color: white; font-family: monospace;
    }
    .overlay-content {
      background: rgba(0,0,0,0.85); padding: 2rem 3rem; border-radius: 60px;
      border-left: 8px solid #facc15; border-right: 8px solid #facc15;
      max-width: 90vw;
    }
    .overlay-nomor { font-size: 7rem; font-weight: 800; color: #facc15; text-shadow: 4px 4px 0 #b45309; }
    .overlay-nama, .overlay-wbp { font-size: 2rem; margin: 0.4rem 0; }
    .overlay-tutup { margin-top: 2rem; background: #facc15; color: #1e3c4a; border: none; padding: 12px 32px; border-radius: 50px; cursor: pointer; }
    .sync-status {
      position: fixed; bottom: 15px; left: 15px; background: #000000aa; color: white;
      padding: 6px 12px; border-radius: 30px; font-size: 0.7rem; font-family: monospace;
      z-index: 2000; backdrop-filter: blur(4px);
    }
    @media (max-width: 700px) {
      .overlay-nomor { font-size: 3.5rem; }
      .overlay-nama, .overlay-wbp { font-size: 1.2rem; }
      .logo-left img, .logo-right img { height: 50px; }
      .floating-input-btn { padding: 5px 12px; bottom: 20px; right: 20px; }
    }
  </style>
</head>
<body>
<div class="main-container">
  <div class="header-wrapper">
    <div class="logo-left"><img src="imipas.png" alt="Kemenimipas" onerror="this.style.display='none'"></div>
    <div class="judul-utama">
      <h2>LAPAS KELAS IIA CIKARANG</h2>
      <h2>JAM MONITORING KUNJUNGAN TERPADU</h2>
      <h2>RANCANGAN AKTUALISASI RICKY MARTIN</h2>
    </div>
    <div class="logo-right"><img src="Pemasyarakatan.png" alt="Pemasyarakatan" onerror="this.style.display='none'"></div>
  </div>
  <div class="table-wrapper">
    <table id="antrianTable">
      <thead><tr><th>No. Antrian</th><th>Nama Pengunjung</th><th>Nama WBP</th><th>Status / Waktu</th><th>Aksi</th></tr></thead>
      <tbody id="tabelData"><tr><td colspan="5" style="text-align:center">⏳ Memuat data antrian...</td></tr></tbody>
    </table>
  </div>
  <div class="hapus-semua-wrapper"><button onclick="hapusSemuaData()">🗑️ Hapus Semua Data</button></div>
</div>
<a href="input.html" class="floating-input-btn"><span>📝</span> Input</a>
<div id="notifikasi" style="display: none"></div>
<div id="fullscreenOverlay" class="fullscreen-overlay" style="display: none;">
  <div class="overlay-content">
    <div style="font-size:1.5rem;">⏰ PEMBERITAHUAN ⏰</div>
    <div class="overlay-nomor" id="overlayNomor">-</div>
    <div class="overlay-nama" id="overlayNamaPengunjung">Pengunjung: -</div>
    <div class="overlay-wbp" id="overlayNamaWBP">WBP: -</div>
    <button class="overlay-tutup" id="tutupOverlayBtn">TUTUP</button>
  </div>
</div>
<div class="sync-status" id="syncStatus">🔄 Menyinkronkan waktu server...</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
  import {
    getFirestore, collection, onSnapshot, deleteDoc, doc, getDocs,
    serverTimestamp, setDoc, addDoc, updateDoc
  } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBsos9OqujXvezT7YmVLzpCssyup9tBduc",
    authDomain: "ruang-kunjungan.firebaseapp.com",
    projectId: "ruang-kunjungan",
    storageBucket: "ruang-kunjungan.firebasestorage.app",
    messagingSenderId: "1070275298561",
    appId: "1:1070275298561:web:c74c42680e7fded17e8700",
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let daftarData = [];
  let suaraPerempuan = null;
  let callQueue = [];
  let isProcessingQueue = false;
  let serverTimeOffset = 0;
  let isOffsetReady = false;
  let overlayTimeout = null;
  let syncInterval = null;
  const perintahPanggilanRef = collection(db, "perintah_panggilan");

  // ========== SINKRONISASI WAKTU SERVER YANG AKURAT ==========
  async function calibrateServerTime(force = false) {
    const statusDiv = document.getElementById("syncStatus");
    if (statusDiv) statusDiv.innerHTML = "📡 Mengukur waktu server...";
    
    const now = Date.now();
    const savedOffset = localStorage.getItem("serverTimeOffset");
    const savedTime = localStorage.getItem("serverTimeOffsetSavedAt");
    if (!force && savedOffset && savedTime && (now - parseInt(savedTime) < 5 * 60 * 1000)) {
      serverTimeOffset = parseInt(savedOffset);
      isOffsetReady = true;
      console.log("Gunakan offset tersimpan:", serverTimeOffset);
      if (statusDiv) statusDiv.innerHTML = "✅ Waktu tersinkron (cached)";
      return true;
    }
    
    console.log("Kalibrasi waktu server dengan 5 sample...");
    const samples = [];
    for (let i = 0; i < 5; i++) {
      try {
        const tempRef = doc(collection(db, "tempTime"));
        const before = Date.now();
        await setDoc(tempRef, { ping: serverTimestamp() });
        const snap = await getDoc(tempRef);
        if (snap.exists()) {
          const serverTime = snap.data().ping.toDate().getTime();
          const after = Date.now();
          const rtt = after - before;
          const clientTime = before + rtt / 2;
          const diff = serverTime - clientTime;
          samples.push(diff);
          console.log(`Sample ${i+1}: diff=${diff}ms, RTT=${rtt}ms`);
        }
        await deleteDoc(tempRef).catch(e=>console.warn);
      } catch(e) { console.warn("Gagal sample", e); }
      await new Promise(r => setTimeout(r, 200));
    }
    
    if (samples.length >= 3) {
      samples.sort((a,b)=>a-b);
      const median = samples[Math.floor(samples.length/2)];
      serverTimeOffset = median;
      localStorage.setItem("serverTimeOffset", serverTimeOffset);
      localStorage.setItem("serverTimeOffsetSavedAt", Date.now());
      isOffsetReady = true;
      console.log("Offset baru (median):", serverTimeOffset, "ms");
      if (statusDiv) statusDiv.innerHTML = `✅ Sinkron (offset ${Math.round(serverTimeOffset)}ms)`;
      return true;
    } else {
      console.warn("Kalibrasi gagal, pakai client time sebagai fallback");
      serverTimeOffset = 0;
      isOffsetReady = true;
      if (statusDiv) statusDiv.innerHTML = "⚠️ Mode klien (tanpa sinkron)";
      return false;
    }
  }
  
  function getCurrentServerTime() { 
    return Date.now() + serverTimeOffset; 
  }
  
  // Lakukan kalibrasi awal & perbaiki setiap 30 detik
  await calibrateServerTime();
  setInterval(() => calibrateServerTime(true), 30000);
  
  // ========== SISTEM PANGGILAN SUARA & BACKSOUND ==========
  function putarBacksound() {
    return new Promise((resolve) => {
      const audio = new Audio("backsound.mpeg");
      audio.volume = 0.7;
      audio.addEventListener('ended', () => resolve());
      audio.addEventListener('error', () => resolve());
      audio.play().catch(() => resolve());
      setTimeout(() => resolve(), 5000);
    });
  }
  
  async function getSuaraPerempuan() {
    if (suaraPerempuan) return suaraPerempuan;
    return new Promise((resolve) => {
      const cek = setInterval(() => {
        const voices = speechSynthesis.getVoices();
        if (voices.length) {
          clearInterval(cek);
          let found = voices.find(v => v.lang === "id-ID" && (v.name.includes("female") || v.name.includes("perempuan")));
          if (!found) found = voices.find(v => v.lang === "id-ID");
          if (!found) found = voices.find(v => v.lang.startsWith("id"));
          suaraPerempuan = found || voices[0];
          resolve(suaraPerempuan);
        }
      }, 100);
    });
  }
  
  async function playSuara(nomor, nama, wbp) {
    const teks = `Mohon Perhatian. Nomor antrian ${nomor}, Pengunjung atas nama ${nama}, kunjungan untuk Saudara ${wbp}, waktu kunjungan telah habis. Silakan meninggalkan ruangan kunjungan. Terima kasih.`;
    const speech = new SpeechSynthesisUtterance(teks);
    speech.lang = "id-ID";
    speech.rate = 0.9;
    speech.pitch = 1.15;
    speech.voice = await getSuaraPerempuan();
    speechSynthesis.speak(speech);
    return new Promise((resolve) => { speech.onend = resolve; speech.onerror = resolve; });
  }
  
  async function panggilSekali(nomor, nama, wbp) {
    await putarBacksound();
    await playSuara(nomor, nama, wbp);
  }
  
  async function processQueue() {
    if (isProcessingQueue) return;
    isProcessingQueue = true;
    while (callQueue.length) {
      const task = callQueue.shift();
      try { await task(); } catch(e) { console.warn(e); }
      await new Promise(r => setTimeout(r, 500));
    }
    isProcessingQueue = false;
  }
  function addToQueue(fn, ...args) { callQueue.push(() => fn(...args)); processQueue(); }
  
  // ========== PERINTAH PANGGILAN ULANG ==========
  async function kirimPerintahPanggilan(nomor, nama, wbp) {
    await addDoc(perintahPanggilanRef, { nomor, nama, wbp, createdAt: serverTimestamp() });
  }
  
  async function eksekusiPerintahPanggilan(docSnap) {
    const data = docSnap.data();
    if (data.nomor && data.nama && data.wbp) {
      tampilkanOverlayFullscreen(data.nomor, data.nama, data.wbp);
      addToQueue(panggilSekali, data.nomor, data.nama, data.wbp);
      tampilNotif("📢 Panggilan Ulang", `Antrian ${data.nomor} - ${data.nama}`, "#0f5c6e");
    }
    await deleteDoc(doc(db, "perintah_panggilan", docSnap.id));
  }
  
  let isProcessingCommand = false;
  onSnapshot(perintahPanggilanRef, async (snapshot) => {
    if (isProcessingCommand) return;
    isProcessingCommand = true;
    for (const change of snapshot.docChanges()) {
      if (change.type === "added") await eksekusiPerintahPanggilan(change.doc);
    }
    isProcessingCommand = false;
  });
  
  // ========== OVERLAY FULLSCREEN ==========
  function tampilkanOverlayFullscreen(nomor, namaPengunjung, namaWBP) {
    const overlay = document.getElementById("fullscreenOverlay");
    if (!overlay) return;
    document.getElementById("overlayNomor").innerText = nomor;
    document.getElementById("overlayNamaPengunjung").innerHTML = `👤 Pengunjung: ${escapeHtml(namaPengunjung)}`;
    document.getElementById("overlayNamaWBP").innerHTML = `🧑‍⚖️ WBP: ${escapeHtml(namaWBP)}`;
    overlay.style.display = "flex";
    if (overlayTimeout) clearTimeout(overlayTimeout);
    overlayTimeout = setTimeout(() => overlay.style.display = "none", 10000);
  }
  function tutupOverlayManual() {
    const overlay = document.getElementById("fullscreenOverlay");
    if (overlay) overlay.style.display = "none";
    if (overlayTimeout) clearTimeout(overlayTimeout);
  }
  document.getElementById("tutupOverlayBtn")?.addEventListener("click", tutupOverlayManual);
  
  // ========== STATUS WAKTU (PERSIAPAN -> KUNJUNGAN -> SELESAI) ==========
  function hitungStatus(item) {
    if (!item.createdAt || typeof item.createdAt.toDate !== 'function') {
      return { text: "⏳ Menunggu", class: "hijau", selesai: false };
    }
    const serverCreated = item.createdAt.toDate().getTime();
    const serverNow = getCurrentServerTime();
    let elapsed = (serverNow - serverCreated) / 1000;
    if (elapsed < 0) elapsed = 0;
    const durasiPersiapan = item.durasiPersiapan || 10;
    const durasiKunjungan = item.durasiKunjungan || 300;
    
    if (elapsed < durasiPersiapan) {
      const sisa = durasiPersiapan - elapsed;
      return { text: `⏳ PERSIAPAN (${Math.ceil(sisa)}s)`, class: "hijau", selesai: false };
    }
    const elapsedKunjungan = elapsed - durasiPersiapan;
    if (elapsedKunjungan < durasiKunjungan) {
      const sisa = durasiKunjungan - elapsedKunjungan;
      const menit = Math.floor(sisa / 60);
      const detik = Math.floor(sisa % 60);
      const kelas = sisa <= 10 ? "merah" : "hijau";
      return { text: `⏱️ ${menit.toString().padStart(2,'0')}:${detik.toString().padStart(2,'0')}`, class: kelas, selesai: false };
    }
    return { text: "✔️ SELESAI", class: "merah", selesai: true };
  }
  
  function escapeHtml(str) { if(!str) return ""; return str.replace(/[&<>]/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;" })[m]); }
  function jsEscape(str) { return str.replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '\\"'); }
  
  // ========== RENDER TABEL (update setiap detik) ==========
  let intervalRender = null;
  
  async function renderTabel() {
    if (!isOffsetReady) {
      document.getElementById("tabelData").innerHTML = '<tr><td colspan="5" style="text-align:center">⏳ Menyinkronkan waktu server...</td></tr>';
      return;
    }
    const tbody = document.getElementById("tabelData");
    if (!tbody) return;
    
    const sortedData = [...daftarData].sort((a,b) => {
      let ta = a.createdAt?.toDate?.()?.getTime() || 0;
      let tb = b.createdAt?.toDate?.()?.getTime() || 0;
      return tb - ta;
    });
    
    if (sortedData.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" style="text-align:center">📭 Belum ada antrian.</td></tr>';
      return;
    }
    
    let html = '';
    for (const item of sortedData) {
      const status = hitungStatus(item);
      const nomorAntrian = item.nomor ?? "—";
      
      // Jika status SELESAI dan belum dipanggil, lakukan panggilan dan update flag
      if (status.selesai && !item.sudahDipanggil) {
        try {
          await updateDoc(doc(db, "antrian", item.id), { sudahDipanggil: true });
          item.sudahDipanggil = true;
          addToQueue(panggilSekali, nomorAntrian, item.nama, item.wbp);
          tampilkanOverlayFullscreen(nomorAntrian, item.nama, item.wbp);
          tampilNotif("⏰ WAKTU HABIS", `${item.nama} → ${item.wbp}`, "#dc2626");
        } catch(e) { console.warn("Gagal update sudahDipanggil", e); }
      }
      
      const safeNomor = jsEscape(String(nomorAntrian));
      const safeNama = jsEscape(item.nama);
      const safeWbp = jsEscape(item.wbp);
      html += `
        <tr>
          <td style="font-weight:600;">${escapeHtml(String(nomorAntrian))}</td>
          <td>${escapeHtml(item.nama)}</td>
          <td>${escapeHtml(item.wbp)}</td>
          <td><span class="${status.class}">${status.text}</span></td>
          <td>
            <div class="aksi-container">
              <button class="btn-ulang-panggilan" onclick="window.ulangiPanggilanRow('${safeNomor}', '${safeNama}', '${safeWbp}')">🔁 Ulang Panggilan</button>
              <button class="btn-hapus-satu" onclick="window.hapusData('${item.id}')">🗑 Hapus</button>
            </div>
          </td>
        </tr>
      `;
    }
    tbody.innerHTML = html;
  }
  
  // Jalankan render setiap 1 detik (akurasi timer realtime)
  if (intervalRender) clearInterval(intervalRender);
  intervalRender = setInterval(() => renderTabel(), 1000);
  
  function tampilNotif(judul, pesan, warna) {
    const box = document.getElementById("notifikasi");
    box.innerHTML = `<div style="position:fixed; top:20px; right:20px; background:${warna}; color:white; padding:16px 24px; border-radius:28px; z-index:10000; box-shadow:0 6px 18px black; font-weight:bold;">${judul}<br>${pesan}</div>`;
    box.style.display = "block";
    setTimeout(() => box.style.display = "none", 4500);
  }
  
  window.ulangiPanggilanRow = function(nomor, nama, wbp) {
    if (!nomor || !nama || !wbp) return;
    kirimPerintahPanggilan(nomor, nama, wbp);
  };
  
  window.hapusData = async function(id) {
    if (!confirm("Hapus antrian ini?")) return;
    await deleteDoc(doc(db, "antrian", id));
  };
  
  window.hapusSemuaData = async function() {
    if (!confirm("PERINGATAN! Hapus SEMUA antrian?")) return;
    const snapshot = await getDocs(collection(db, "antrian"));
    for (const d of snapshot.docs) await deleteDoc(doc(db, "antrian", d.id));
    await setDoc(doc(db, "counter", "antrianCounter"), { value: 0 });
    tampilNotif("✅ Semua data dihapus", "Counter direset", "#1e293b");
  };
  
  // Listener realtime antrian
  onSnapshot(collection(db, "antrian"), (snapshot) => {
    const newData = [];
    snapshot.forEach(docSnap => newData.push({ id: docSnap.id, ...docSnap.data() }));
    daftarData = newData;
    // render akan dijalankan oleh interval, tidak perlu langsung render di sini
  });
  
  // Inisialisasi suara perempuan
  getSuaraPerempuan();
  
  // Pastikan render pertama segera dijalankan setelah offset siap
  const cekOffset = setInterval(() => {
    if (isOffsetReady) {
      clearInterval(cekOffset);
      renderTabel();
    }
  }, 200);
</script>
</body>
</html>
