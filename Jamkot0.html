</head>

<body>

<div class="card">

    <h1>📝 Input Antrian</h1>

    <div class="form-group">
        <label>Nama Pengunjung</label>
        <input type="text" id="nama" placeholder="Masukkan nama pengunjung">
    </div>

    <div class="form-group">
        <label>Nama WBP</label>
        <input type="text" id="wbp" placeholder="Masukkan nama WBP">
    </div>

    <button onclick="tambahAntrian()">
        ➕ Tambah Antrian
    </button>

    <div id="notif" class="notif success"></div>

    <div class="toolbar">
        <a href="index.html">📺 Dashboard</a>
    </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
    getDatabase,
    ref,
    get,
    set
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";


// ================= FIREBASE =================
const firebaseConfig = {
    apiKey: "AIzaSyBfe6l1oz-oHEnIpExWf7L_c7WOVAQGz3U",
    authDomain: "jamkot-73af5.firebaseapp.com",
    databaseURL: "https://jamkot-73af5-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "jamkot-73af5",
    storageBucket: "jamkot-73af5.firebasestorage.app",
    messagingSenderId: "920727142933",
    appId: "1:920727142933:web:2fe747a74d76873e61041c",
    measurementId: "G-93MKKF2F2B"
};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const dataRef = ref(db, "antrian");


// ================= TAMBAH ANTRIAN =================
window.tambahAntrian = async function(){

    const nama = document.getElementById("nama").value.trim();

    const wbp = document.getElementById("wbp").value.trim();

    if(!nama || !wbp){
        alert("Semua field wajib diisi");
        return;
    }

    try{

        const snapshot = await get(dataRef);

        let daftarData = [];

        if(snapshot.exists()){
            daftarData = snapshot.val();
        }

        daftarData.push({
            nama: nama,
            wbp: wbp,
            waktu: 60,
            selesai: false,
            persiapan: false,
            waktuPersiapan: 10
        });

        await set(dataRef, daftarData);

        document.getElementById("nama").value = "";
        document.getElementById("wbp").value = "";

        tampilNotif("✅ Antrian berhasil ditambahkan");

    }catch(err){

        console.error(err);

        alert("Gagal menambahkan data");
    }
}


// ================= NOTIF =================
function tampilNotif(teks){

    const notif = document.getElementById("notif");

    notif.innerHTML = teks;

    notif.style.display = "block";

    setTimeout(()=>{
        notif.style.display = "none";
    },3000);
}

</script>

</body>
</html>
