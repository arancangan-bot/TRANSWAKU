<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>Jamkot | Dashboard Antrian - Lapas Cikarang (Mode TV)</title>
    <style>
     * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", "Poppins", system-ui;
        min-height: 100vh;
        padding: 30px 20px;
        background-image: url("background.png");
        background-size: cover;
        background-position: center;
        background-color: #0f2c38;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      body {
        font-family: "Segoe UI", system-ui, 'Roboto', sans-serif;
        min-height: 100vh;
      }

      .main-container {
        width: 100%;
        min-height: 100vh;
        background: rgba(255, 255, 255, 0.96);
        padding: 20px 30px 25px;
        border-radius: 0;
        display: flex;
        flex-direction: column;
      }

      .header-wrapper {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        border-bottom: 4px solid #facc15;
        background-image: url('background.png');
        background-size: cover;
        background-position: center 35%;
        padding-bottom: 5px;
        margin-bottom: 5px;
        gap: 5px;
      }

      /* Geser logo ke tengah masing-masing 0.5cm */
      .logo-left {
        margin-left: 0.5cm;
      }
      .logo-right {
        margin-right: 0.5cm;
      }

      .logo-left img, .logo-right img {
        height: 85px;
        object-fit: contain;
      }

      .judul-utama {
        text-align: center;
        flex: 1;
      }

      .judul-utama h2 {
        text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        color: #ffe484;
        font-size: 1.5rem;
      }
      .judul-utama h2:first-child { font-size: 1.4rem; }
      .judul-utama h2:last-child { font-size: 1.1rem; }

      .header-right { display: flex; align-items: center; gap: 12px; }

      .floating-input-btn {
        position: fixed;
        bottom: 25px;
        right: 25px;
        z-index: 9999;
        background: #2a7f62;
        color: white;
        border: none;
        border-radius: 50px;
        padding: 12px 24px;
        font-size: 0.9rem;
        font-weight: bold;
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        box-shadow: 0 6px 16px rgba(0,0,0,0.3);
        transition: 0.2s;
      }
      .floating-input-btn:hover { background: #3a9f7a; transform: scale(1.02); }

      .btn-ulang-panggilan, .btn-hapus-satu {
        padding: 6px 18px;
        border-radius: 30px;
        color: white;
        font-size: 0.75rem;
        border: none;
        cursor: pointer;
      }
      .btn-ulang-panggilan { background: #0f5c6e; }
      .btn-ulang-panggilan:hover { background: #1a7a8c; }
      .btn-hapus-satu { background: #b91c1c; }
      .btn-hapus-satu:hover { background: #c92a2a; }

      .aksi-container {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
      }

      .hapus-semua-wrapper {
        text-align: center;
        margin-top: 25px;
      }
      .hapus-semua-wrapper button {
        background: #9b2c2c;
        padding: 12px 28px;
        border-radius: 40px;
        color: white;
        border: none;
        cursor: pointer;
      }

      .table-wrapper {
        overflow-x: auto;
        max-height: 62vh;
        border: 1px solid #cfdee9;
        border-radius: 20px;
        background: white;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th {
        background: #1e3c4a;
        color: white;
        padding: 14px;
        position: sticky;
        top: 0;
      }
      td {
        padding: 12px 8px;
        border-bottom: 1px solid #e9eef3;
      }
      td:first-child, th:first-child {
        text-align: center;
        font-weight: 600;
      }
      .merah {
        background: #fee2e2;
        color: #dc2626;
        border-radius: 40px;
        padding: 4px 12px;
        display: inline-block;
      }
      .hijau {
        background: #dcfce7;
        color: #0e7c32;
        border-radius: 40px;
        padding: 4px 12px;
        display: inline-block;
      }

      .auto-refresh-badge { display: none; }
      #notifikasi {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 10000;
      }

      @media (max-width: 850px) {
        .main-container { padding: 15px; }
        .logo-left img, .logo-right img { height: 60px; }
        .floating-input-btn { padding: 8px 18px; font-size: 0.75rem; bottom: 15px; right: 15px; }
        /* Pada layar kecil, margin tetap 0.5cm (atau boleh dikurangi jika perlu) */
        .logo-left { margin-left: 0.3cm; }
        .logo-right { margin-right: 0.3cm; }
      }
    </style>
  </head>
  <body>
    <div class="main-container">
      <div class="header-wrapper">
        <div class="logo-left"><img src="imipas.png" alt="Kemenimipas" onerror="this.style.display='none'"></div>
        <div class="judul-utama">
          <h2>LAPAS KELAS IIA CIKARANG</h2>
          <h2>JAM MONITORING KUNJUNGAN TERPADU</h2>
          <h2>RANCANGAN AKTUALISASI RICKY MARTIN</h2>
        </div>
        <div class="header-right"><div class="logo-right"><img src="Pemasyarakatan.png" alt="Pemasyarakatan" onerror="this.style.display='none'"></div></div>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr><th>No. Antrian</th><th>Nama Pengunjung</th><th>Nama WBP</th><th>Status / Waktu</th><th>Aksi</th></tr>
          </thead>
          <tbody id="tabelData"></tbody>
        </table>
      </div>
      <div class="hapus-semua-wrapper"><button onclick="hapusSemuaData()">🗑️ Hapus Semua Data</button></div>
    </div>
    <button class="floating-input-btn" onclick="window.location.href='input.html'">📝 Input Antrian</button>
    <div id="notifikasi" style="display: none"></div>
    <div class="auto-refresh-badge" id="refreshIndicator"></div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
      import { getFirestore, collection, onSnapshot, deleteDoc, doc, getDocs, serverTimestamp, setDoc, getDoc, updateDoc, addDoc } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBsos9OqujXvezT7YmVLzpCssyup9tBduc",
        authDomain: "ruang-kunjungan.firebaseapp.com",
        projectId: "ruang-kunjungan",
        storageBucket: "ruang-kunjungan.firebasestorage.app",
        messagingSenderId: "1070275298561",
        appId: "1:1070275298561:web:c74c42680e7fded17e8700",
      };
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      let daftarData = [];
      let suaraPerempuan = null;
      let callQueue = [];
      let isProcessingQueue = false;
      let serverTimeOffset = 0;
      let isOffsetReady = false;
      const perintahPanggilanRef = collection(db, "perintah_panggilan");

      async function calibrateServerTime() {
        const savedOffset = localStorage.getItem("serverTimeOffset");
        const savedTime = localStorage.getItem("serverTimeOffsetSavedAt");
        if (savedOffset && savedTime && (Date.now() - parseInt(savedTime) < 5 * 60 * 1000)) {
          serverTimeOffset = parseInt(savedOffset);
          isOffsetReady = true;
          return;
        }
        const samples = [];
        for (let i = 0; i < 5; i++) {
          try {
            const tempRef = doc(collection(db, "tempTime"));
            const before = Date.now();
            await setDoc(tempRef, { ping: serverTimestamp() });
            const snap = await getDoc(tempRef);
            const serverTime = snap.data().ping.toDate().getTime();
            const after = Date.now();
            const rtt = after - before;
            const clientTime = before + rtt / 2;
            const offset = serverTime - clientTime;
            samples.push(offset);
            await deleteDoc(tempRef);
          } catch(e) { console.warn(e); }
          await new Promise(r => setTimeout(r, 100));
        }
        if (samples.length === 0) { serverTimeOffset = 0; isOffsetReady = true; return; }
        samples.sort((a,b)=>a-b);
        serverTimeOffset = samples[Math.floor(samples.length/2)];
        localStorage.setItem("serverTimeOffset", serverTimeOffset);
        localStorage.setItem("serverTimeOffsetSavedAt", Date.now());
        isOffsetReady = true;
      }
      function getCurrentServerTime() { return Date.now() + serverTimeOffset; }
      setInterval(() => { if(isOffsetReady) calibrateServerTime(); }, 35000);

      async function getSuaraPerempuan() {
        return new Promise((resolve) => {
          if(suaraPerempuan) { resolve(suaraPerempuan); return; }
          const cek = setInterval(() => {
            const voices = speechSynthesis.getVoices();
            if(voices.length) {
              clearInterval(cek);
              let preferred = voices.find(v => v.lang==="id-ID" && (v.name.toLowerCase().includes("female") || v.name.toLowerCase().includes("perempuan")));
              if(!preferred) preferred = voices.find(v => v.lang==="id-ID");
              if(!preferred) preferred = voices.find(v => v.lang.startsWith("id"));
              suaraPerempuan = preferred || voices[0];
              resolve(suaraPerempuan);
            }
          }, 100);
        });
      }
      async function playSuara(nomor, nama, wbp) {
        const teks = `Mohon Perhatian. Nomor antrian ${nomor}, Pengunjung atas nama ${nama}, kunjungan untuk Saudara ${wbp}, waktu kunjungan telah habis. Silakan meninggalkan ruangan kunjungan. Terima kasih.`;
        const speech = new SpeechSynthesisUtterance(teks);
        speech.lang = "id-ID";
        speech.rate = 0.9;
        speech.pitch = 1.15;
        speech.voice = await getSuaraPerempuan();
        speechSynthesis.speak(speech);
      }
      function putarBacksound() {
        const audio = new Audio("backsound.mpeg");
        audio.play().catch(e => console.warn("Gagal putar backsound:", e));
      }
      async function panggilSekali(nomor, nama, wbp) {
        putarBacksound();
        await new Promise(r => setTimeout(r, 3000));
        await playSuara(nomor, nama, wbp);
      }

      async function processQueue() {
        if(isProcessingQueue) return;
        isProcessingQueue = true;
        while(callQueue.length) {
          const task = callQueue.shift();
          try { await task(); } catch(e) { console.error(e); }
          await new Promise(r => setTimeout(r, 500));
        }
        isProcessingQueue = false;
      }
      function addToQueue(fn, ...args) { callQueue.push(() => fn(...args)); processQueue(); }

      async function kirimPerintahPanggilan(nomor, nama, wbp) {
        try { await addDoc(perintahPanggilanRef, { nomor, nama, wbp, createdAt: serverTimestamp() }); } catch(e) { console.warn(e); }
      }
      async function eksekusiPerintahPanggilan(docSnap) {
        const { nomor, nama, wbp } = docSnap.data();
        if(nomor && nama && wbp) addToQueue(panggilSekali, nomor, nama, wbp);
        await deleteDoc(doc(db, "perintah_panggilan", docSnap.id));
      }
      let isProcessingCommand = false;
      onSnapshot(perintahPanggilanRef, async (snapshot) => {
        if(isProcessingCommand) return;
        isProcessingCommand = true;
        try {
          for(const change of snapshot.docChanges()) {
            if(change.type === "added") await eksekusiPerintahPanggilan(change.doc);
          }
        } catch(e) { console.warn(e); }
        finally { isProcessingCommand = false; }
      });

      function hitungStatus(item) {
        if(!item.createdAt || typeof item.createdAt.toDate !== 'function') return { text: "⏳ Memuat...", class: "hijau" };
        const serverCreated = item.createdAt.toDate().getTime();
        const serverNow = getCurrentServerTime();
        let elapsed = (serverNow - serverCreated)/1000;
        if(elapsed<0) elapsed=0;
        const persiapan = item.durasiPersiapan || 10;
        const kunjungan = item.durasiKunjungan || 300;
        if(elapsed < persiapan) {
          const sisa = persiapan - elapsed;
          return { text: `⏳ PERSIAPAN (${Math.ceil(sisa)}s)`, class: "hijau" };
        }
        const elapsedKunjungan = elapsed - persiapan;
        if(elapsedKunjungan < kunjungan) {
          const sisa = kunjungan - elapsedKunjungan;
          const menit = Math.floor(sisa/60);
          const detik = Math.floor(sisa%60);
          return { text: `⏱️ ${menit.toString().padStart(2,'0')}:${detik.toString().padStart(2,'0')}`, class: sisa<=10 ? "merah" : "" };
        }
        return { text: "✔️ SELESAI", class: "merah", selesai: true };
      }

      function escapeHtml(str) { if(!str) return ""; return str.replace(/[&<>]/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;"})[m]); }
      function jsEscape(str) { if(!str) return ''; return str.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"'); }

      let renderRequestId = null;
      async function renderTabel() {
        if(!isOffsetReady) {
          const tbody = document.getElementById("tabelData");
          if(tbody) tbody.innerHTML = '<tr><td colspan="5" style="text-align:center">⏳ Sinkronisasi waktu...</td></tr>';
          return;
        }
        const tbody = document.getElementById("tabelData");
        if(!tbody) return;
        tbody.innerHTML = "";
        
        // Urutkan berdasarkan createdAt (terbaru di atas)
        const sortedData = [...daftarData].sort((a, b) => {
          const timeA = a.createdAt?.toDate?.()?.getTime() || 0;
          const timeB = b.createdAt?.toDate?.()?.getTime() || 0;
          return timeB - timeA;
        });
        
        for(const item of sortedData) {
          const status = hitungStatus(item);
          let nomorAntrian = item.nomor || "—";
          
          if(status.selesai && !item.sudahDipanggil) {
            try {
              await updateDoc(doc(db,"antrian",item.id), { sudahDipanggil: true });
              item.sudahDipanggil = true;
              addToQueue(panggilSekali, nomorAntrian, item.nama, item.wbp);
              const box = document.getElementById("notifikasi");
              if(box) {
                box.innerHTML = `<div style="background:#dc2626; color:white; padding:14px 22px; border-radius:28px;"><strong>⏰ WAKTU HABIS</strong><br>${escapeHtml(item.nama)} → ${escapeHtml(item.wbp)}</div>`;
                box.style.display = "block";
                setTimeout(() => { box.style.display = "none"; }, 4000);
              }
            } catch(e) { console.warn("Gagal update sudahDipanggil:", e); }
          }
          
          tbody.innerHTML += `<tr>
            <td>${escapeHtml(String(nomorAntrian))}</td>
            <td>${escapeHtml(item.nama)}</td>
            <td>${escapeHtml(item.wbp)}</td>
            <td><span class="${status.class}">${status.text}</span></td>
            <td><div class="aksi-container">
              <button class="btn-ulang-panggilan" onclick="ulangiPanggilanRow('${jsEscape(String(nomorAntrian))}', '${jsEscape(item.nama)}', '${jsEscape(item.wbp)}')">🔁 Ulang Panggilan</button>
              <button class="btn-hapus-satu" onclick="hapusData('${item.id}')">🗑 Hapus</button>
            </div></td>
          </tr>`;
        }
        if(renderRequestId) cancelAnimationFrame(renderRequestId);
        renderRequestId = requestAnimationFrame(() => { setTimeout(() => renderTabel(), 200); });
      }

      window.hapusData = async function(id) {
        if(!id) {
          alert("ID data tidak valid!");
          return;
        }
        if(confirm("Apakah Anda yakin ingin menghapus antrian ini?")) {
          try {
            await deleteDoc(doc(db, "antrian", id));
            const box = document.getElementById("notifikasi");
            if(box) {
              box.innerHTML = `<div style="background:#2a7f62; color:white; padding:12px 20px; border-radius:28px;">✅ Data berhasil dihapus</div>`;
              box.style.display = "block";
              setTimeout(() => { box.style.display = "none"; }, 2000);
            }
          } catch(error) {
            console.error("Gagal menghapus:", error);
            alert("Terjadi kesalahan saat menghapus data. Lihat konsol untuk detail.");
          }
        }
      };
      
      window.hapusSemuaData = async function() {
        if(!confirm("⚠️ PERINGATAN: Anda akan menghapus SEMUA data antrian?")) return;
        try {
          const snapshot = await getDocs(collection(db,"antrian"));
          const promises = [];
          snapshot.forEach(d => promises.push(deleteDoc(doc(db,"antrian",d.id))));
          await Promise.all(promises);
          await setDoc(doc(db,"counter","antrianCounter"), { value: 0 });
          const box = document.getElementById("notifikasi");
          if(box) {
           
            box.style.display = "block";
            setTimeout(() => { box.style.display = "none"; }, 3000);
          }
        } catch(error) {
          console.error("Gagal hapus semua:", error);
          alert("Gagal menghapus semua data: " + error.message);
        }
      };
      
      window.ulangiPanggilanRow = function(nomor, nama, wbp) {
        if(!nomor || !nama || !wbp) return;
        kirimPerintahPanggilan(nomor, nama, wbp);
        const box = document.getElementById("notifikasi");
        if(box) {
          box.innerHTML = `<div style="background:#0f5c6e; color:white; padding:12px 20px; border-radius:28px;"><strong>📡 Perintah dikirim</strong><br>Panggilan ulang antrian ${nomor} di semua layar</div>`;
          box.style.display = "block";
          setTimeout(() => { box.style.display = "none"; }, 4000);
        }
      };

      onSnapshot(collection(db,"antrian"), (snapshot) => {
        const newData = [];
        snapshot.forEach(doc => newData.push({ id: doc.id, ...doc.data() }));
        daftarData = newData;
        renderTabel();
      });

      window.onload = async function() {
        await calibrateServerTime();
        await getSuaraPerempuan();
        renderTabel();
      };
    </script>
  </body>
</html>
