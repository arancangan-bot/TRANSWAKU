<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Input Antrian - Lapas Cikarang</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        /* (Gunakan style yang sama seperti kode input asli, bisa copy dari style sebelumnya) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui;
            min-height: 100vh;
            padding: 30px 20px;
            background: #0f2c38;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card-input {
            max-width: 550px;
            width: 100%;
            background: rgba(255,255,255,0.96);
            border-radius: 2rem;
            padding: 2rem;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
        }
        .logo-area { text-align: center; margin-bottom: 20px; }
        .logo-area img { height: 70px; }
        .judul { text-align: center; margin-bottom: 30px; }
        .judul h2 { color: #1e3c4a; border-left: 6px solid #facc15; display: inline-block; padding: 0 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { font-weight: 700; display: block; margin-bottom: 8px; color: #0f2c38; }
        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 60px;
            font-size: 1rem;
        }
        .btn-group { display: flex; gap: 15px; margin-top: 20px; }
        button {
            flex: 1;
            padding: 12px;
            border-radius: 60px;
            font-weight: 700;
            border: none;
            cursor: pointer;
        }
        .btn-simpan { background: #2a7f62; color: white; }
        .btn-back { background: #475569; color: white; }
        .info-antrian { background: #f1f5f9; border-radius: 2rem; padding: 12px; text-align: center; margin-top: 20px; }
        .notif-sukses {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #0e7c32;
            color: white;
            padding: 14px;
            border-radius: 60px;
            text-align: center;
            z-index: 1000;
        }
    </style>
</head>
<body>
<div class="card-input">
    <div class="logo-area"><img src="https://via.placeholder.com/70?text=Kemenimipas" alt="Logo"></div>
    <div class="judul"><h2>📋 TAMBAH ANTRIAN</h2><p>Lapas Kelas IIA Cikarang</p></div>
    <div class="form-group"><label>👤 Nama Pengunjung</label><input type="text" id="namaPengunjung" placeholder=""></div>
    <div class="form-group"><label>🔒 Nama WBP / Tahanan</label><input type="text" id="namaWbp" placeholder=""></div>
    <div class="btn-group">
        <button class="btn-simpan" onclick="tambahAntrian()">✅ Simpan Antrian</button>
        <button class="btn-back" onclick="window.location.href='index.html'">← Dashboard</button>
    </div>
    <div class="info-antrian" id="infoAntrian">Memuat jumlah antrian...</div>
</div>
<div id="notifTemp"></div>

<script>
   // Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyBmWTuBg0PBpZSEWNJUm9pJwEQuV03O2MY",
  authDomain: "antrian-lapas-cikarang.firebaseapp.com",
  projectId: "antrian-lapas-cikarang",
  storageBucket: "antrian-lapas-cikarang.firebasestorage.app",
  messagingSenderId: "283658990470",
  appId: "1:283658990470:web:351606d22d74777586b207",
  measurementId: "G-CDJR3PEH53"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const antrianRef = database.ref('antrian');

    function loadJumlahAntrian() {
        antrianRef.once('value', (snapshot) => {
            const data = snapshot.val();
            const jumlah = data ? Object.keys(data).length : 0;
            document.getElementById('infoAntrian').innerHTML = `📊 Total antrian saat ini: ${jumlah} orang`;
        });
    }

    function tambahAntrian() {
        let nama = document.getElementById('namaPengunjung').value.trim();
        let wbp = document.getElementById('namaWbp').value.trim();
        if (!nama || !wbp) {
            tampilNotif("⚠️ Kedua field harus diisi!", true);
            return;
        }
        const newAntrian = {
            nama: nama,
            wbp: wbp,
            persiapan: true,
            waktuPersiapan: 10,
            selesai: false,
            waktu: 0,
            timestamp: Date.now()
        };
        antrianRef.push(newAntrian).then(() => {
            tampilNotif(`✅ Antrian ditambahkan! ${nama} → ${wbp}`);
            document.getElementById('namaPengunjung').value = '';
            document.getElementById('namaWbp').value = '';
            loadJumlahAntrian();
        }).catch(err => {
            tampilNotif("Gagal menyimpan: " + err.message, true);
        });
    }

    function tampilNotif(pesan, isError = false) {
        let div = document.createElement('div');
        div.className = 'notif-sukses';
        div.style.background = isError ? '#b91c1c' : '#0e7c32';
        div.innerText = pesan;
        let container = document.getElementById('notifTemp');
        container.innerHTML = '';
        container.appendChild(div);
        setTimeout(() => div.remove(), 3000);
    }

    loadJumlahAntrian();
    setInterval(loadJumlahAntrian, 5000);
</script>
</body>
</html>
