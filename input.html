<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>Jamkot | Input Antrian - Lapas Cikarang</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", "Poppins", system-ui;
        min-height: 100vh;
        padding: 30px 20px;
        background-image: url("background.png");
        background-size: cover;
        background-position: center;
        background-color: #0f2c38;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .card-input {
        max-width: 550px;
        width: 100%;
        background: rgba(255, 255, 255, 0.96);
        border-radius: 2rem;
        padding: 2rem;
        box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
      }
      .logo-area {
        text-align: center;
        margin-bottom: 20px;
      }
      .logo-area img {
        height: 70px;
        margin: 0 5px;
      }
      .judul {
        text-align: center;
        margin-bottom: 30px;
      }
      .judul h2 {
        color: #1e3c4a;
        display: inline-block;
        padding: 0 20px;
      }
      .form-group {
        margin-bottom: 20px;
      }
      .form-group label {
        font-weight: 700;
        display: block;
        margin-bottom: 8px;
        color: #0f2c38;
      }
      .form-group input {
        width: 100%;
        padding: 14px 18px;
        border: 2px solid #e2e8f0;
        border-radius: 60px;
        font-size: 1rem;
      }
      .form-group input:focus {
        border-color: #2a7f62;
        outline: none;
      }
      .btn-group {
        display: flex;
        gap: 15px;
        margin-top: 20px;
      }
      button {
        flex: 1;
        padding: 12px;
        border-radius: 60px;
        font-weight: 700;
        border: none;
        cursor: pointer;
        transition: 0.2s;
      }
      .btn-simpan {
        background: #2a7f62;
        color: white;
      }
      .btn-back {
        background: #475569;
        color: white;
      }
      button:hover {
        transform: translateY(-2px);
        filter: brightness(1.05);
      }
      .info-antrian {
        background: #f1f5f9;
        border-radius: 2rem;
        padding: 12px;
        text-align: center;
        margin-top: 20px;
        font-weight: 600;
      }
      .notif-sukses {
        position: fixed;
        bottom: 20px;
        left: 20px;
        right: 20px;
        background: #0e7c32;
        color: white;
        padding: 14px;
        border-radius: 60px;
        text-align: center;
        z-index: 1000;
        max-width: 400px;
        margin: 0 auto;
      }
      .catatan-kecil {
        font-size: 0.75rem;
        color: #475569;
        margin-top: 5px;
        margin-left: 12px;
      }
    </style>
  </head>
  <body>
    <div class="card-input">
      <div class="logo-area">
        <img src="imipas.png" alt="Kemenimipas" onerror="this.style.display = 'none'" />
        <img src="Pemasyarakatan.png" alt="Pemasyarakatan" onerror="this.style.display = 'none'" />
      </div>
      <div class="judul">
        <h2>TAMBAH ANTRIAN</h2>
        <p>LAPAS KELAS IIA CIKARANG</p>
      </div>
      
      <div class="form-group">
        <label>🔢 Nomor Antrian <span style="font-weight:normal;">(Opsional)</span></label>
        <input type="number" id="nomorAntrian" placeholder="Kosongkan = otomatis (1,2,3...)" min="1" step="1" />
      </div>

      <div class="form-group"><label>👤 Nama Pengunjung</label><input type="text" id="namaPengunjung" placeholder="contoh: Budi Santoso" /></div>
      <div class="form-group"><label>🔒 Nama WBP / Tahanan</label><input type="text" id="namaWbp" placeholder="contoh: Andi Wijaya bin Budi Santoso (A1.1)" autocomplete="off" /></div>
      <div class="btn-group"><button class="btn-simpan" onclick="tambahAntrianBaru()">✅ Simpan Antrian</button><button class="btn-back" onclick="kembaliKeDashboard()">← List Pengunjung</button></div>
      <div class="info-antrian" id="infoAntrian">Memuat jumlah antrian...</div>
    </div>
    <div id="notifTemp"></div>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-app.js";
      import { getFirestore, collection, addDoc, getDocs, serverTimestamp, doc, getDoc, setDoc, runTransaction, query, where } from "https://www.gstatic.com/firebasejs/12.5.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBsos9OqujXvezT7YmVLzpCssyup9tBduc",
        authDomain: "ruang-kunjungan.firebaseapp.com",
        projectId: "ruang-kunjungan",
        storageBucket: "ruang-kunjungan.firebasestorage.app",
        messagingSenderId: "1070275298561",
        appId: "1:1070275298561:web:c74c42680e7fded17e8700",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      async function loadData() {
        try {
          const snapshot = await getDocs(collection(db, "antrian"));
          document.getElementById("infoAntrian").innerHTML = `📊 Total antrian saat ini: ${snapshot.size} orang`;
        } catch (error) {
          console.error(error);
        }
      }

      function tampilNotif(pesan, isError = false) {
        let div = document.createElement("div");
        div.className = "notif-sukses";
        div.style.background = isError ? "#b91c1c" : "#0e7c32";
        div.innerText = pesan;
        let container = document.getElementById("notifTemp");
        container.innerHTML = "";
        container.appendChild(div);
        setTimeout(() => { div.remove(); }, 3500);
      }

      async function getNextNomor() {
        const counterRef = doc(db, "counter", "antrianCounter");
        try {
          const result = await runTransaction(db, async (transaction) => {
            const counterDoc = await transaction.get(counterRef);
            let current = 1;
            if (counterDoc.exists()) {
              current = counterDoc.data().value + 1;
            }
            transaction.set(counterRef, { value: current });
            return current;
          });
          return result;
        } catch (error) {
          console.error("Gagal mendapatkan nomor antrian (transaksi):", error);
          const snapshot = await getDocs(collection(db, "antrian"));
          let max = 0;
          snapshot.forEach(docSnap => {
            const nomor = docSnap.data().nomor || 0;
            if (nomor > max) max = nomor;
          });
          return max + 1;
        }
      }

      async function isNomorTerpakai(nomor) {
        const q = query(collection(db, "antrian"), where("nomor", "==", nomor));
        const snapshot = await getDocs(q);
        return !snapshot.empty;
      }

      async function updateCounterJikaPerlu(nomorManual) {
        const counterRef = doc(db, "counter", "antrianCounter");
        await runTransaction(db, async (transaction) => {
          const counterDoc = await transaction.get(counterRef);
          let currentVal = 0;
          if (counterDoc.exists()) currentVal = counterDoc.data().value;
          if (nomorManual > currentVal) {
            transaction.set(counterRef, { value: nomorManual });
          }
        });
      }

      window.tambahAntrianBaru = async function () {
        let nama = document.getElementById("namaPengunjung").value.trim();
        let wbp = document.getElementById("namaWbp").value.trim();
        let inputNomor = document.getElementById("nomorAntrian").value.trim();

        if (!nama || !wbp) {
          tampilNotif("⚠️ Nama Pengunjung dan Nama WBP wajib diisi!", true);
          return;
        }

        let nomorFinal = null;
        let isManual = false;

        if (inputNomor !== "") {
          const nomorParsed = parseInt(inputNomor, 10);
          if (isNaN(nomorParsed) || nomorParsed < 1) {
            tampilNotif("❌ Nomor antrian harus angka positif (minimal 1)", true);
            return;
          }
          const sudahTerpakai = await isNomorTerpakai(nomorParsed);
          if (sudahTerpakai) {
            tampilNotif(`❌ Nomor ${nomorParsed} sudah digunakan. Gunakan nomor lain atau kosongkan untuk otomatis.`, true);
            return;
          }
          nomorFinal = nomorParsed;
          isManual = true;
        } else {
          nomorFinal = await getNextNomor();
          isManual = false;
        }

        if (!nomorFinal) {
          tampilNotif("❌ Gagal menentukan nomor antrian", true);
          return;
        }

        try {
          if (isManual) {
            await updateCounterJikaPerlu(nomorFinal);
          }

          // DURASI KUNJUNGAN 300 DETIK (5 MENIT)
          await addDoc(collection(db, "antrian"), {
            nomor: nomorFinal,
            nama: nama,
            wbp: wbp,
            status: "persiapan",
            createdAt: serverTimestamp(),
            durasiPersiapan: 10,
            durasiKunjungan: 10,
            sudahDipanggil: false
          });

          tampilNotif(`✅ Antrian berhasil ditambahkan (Nomor: ${nomorFinal})`);
          document.getElementById("namaPengunjung").value = "";
          document.getElementById("namaWbp").value = "";
          document.getElementById("nomorAntrian").value = "";
          document.getElementById("namaPengunjung").focus();
          loadData();
        } catch (error) {
          console.error("Gagal simpan antrian:", error);
          tampilNotif("❌ Gagal menyimpan data ke Firebase. Cek koneksi atau coba lagi.", true);
        }
      };

      window.kembaliKeDashboard = function () {
        window.location.href = "./Jamkot0.html";
      };

      loadData();
      setInterval(loadData, 5000);
    </script>
  </body>
</html>
