<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Input Kunjungan</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-6 rounded-xl shadow w-80">
  <h2 class="text-xl font-bold text-center mb-4">Input Kunjungan</h2>

  <input id="pengunjung" class="w-full p-2 border rounded mb-2" placeholder="Nama Pengunjung">
  <input id="wbp" class="w-full p-2 border rounded mb-3" placeholder="Nama WBP">

  <button onclick="kirim()" class="w-full bg-blue-500 text-white p-2 rounded">
    Tambah Antrian
  </button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "ISI_CONFIG_KAMU",
  authDomain: "ISI",
  databaseURL: "ISI",
  projectId: "ISI"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function kirim() {
  const pengunjung = document.getElementById('pengunjung').value;
  const wbp = document.getElementById('wbp').value;

  if (!pengunjung || !wbp) {
    alert("Harap isi semua");
    return;
  }

  db.ref("kunjungan").push({
    pengunjung,
    wbp,
    waktu: new Date().toLocaleString(),
    start: Date.now(),
    called: false
  });

  alert("Antrian ditambahkan");
}
</script>

</body>
</html>
