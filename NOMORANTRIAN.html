<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Sistem Antrian LED</title>

<style>
body {
    margin:0;
    font-family: 'Courier New', monospace;
    color:white;

    background: 
        linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
        url("https://images.unsplash.com/photo-1504384308090-c894fdcc538d");

    background-size: cover;
    background-position: center;
    background-attachment: fixed;
}

/* LAYOUT */
.container {
    display:flex;
    height:80vh;
}

.loket {
    flex:1;
    border:3px solid #FFFFFF;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background: rgba(0,0,0,0.6);
}

/* TEXT */
h1 {
    font-size:40px;
    margin-bottom:10px;
}

.label {
    font-size:25px;
    color:#ccc;
}

.nomor {
    font-size:180px;
    color:#00ffcc;
    text-shadow: 
        0 0 10px #00ffcc,
        0 0 20px #00ffcc,
        0 0 40px #00ffcc;
}

/* CONTROL */
.control {
    height:20vh;
    text-align:center;
    padding-top:20px;
}

button {
    padding:15px 30px;
    font-size:20px;
    margin:10px;
    cursor:pointer;
    border:none;
    border-radius:8px;
    transition:0.3s;
}

button:hover {
    transform: scale(1.05);
}

.next {
    background:#00ffcc;
    color:black;
}

.reset {
    background:red;
    color:white;
}

.repeat {
    background:orange;
    color:black;
}

.history {
    margin-top:10px;
    font-size:18px;
}
</style>
</head>

<body>

<div class="container">
    <div class="loket">
        <h1>LOKET 1</h1>
        <div class="label">NOMOR URUTAN</div>
        <div id="loket1" class="nomor">0</div>
    </div>

    <div class="loket">
        <h1>LOKET 2</h1>
        <div class="label">NOMOR URUTAN</div>
        <div id="loket2" class="nomor">0</div>
    </div>
</div>

<div class="control">
    <button class="next" onclick="next(1)">NEXT LOKET 1</button>
    <button class="next" onclick="next(2)">NEXT LOKET 2</button>
    <button class="repeat" onclick="ulang()">ULANGI SUARA</button>
    <button class="reset" onclick="resetData()">RESET</button>

    <div class="history" id="history"></div>
</div>

<script>
// ambil dari localStorage
let nomor = localStorage.getItem("nomor") ? parseInt(localStorage.getItem("nomor")) : 0;
let loket1 = localStorage.getItem("loket1") || 0;
let loket2 = localStorage.getItem("loket2") || 0;

// simpan terakhir
let lastNomor = null;
let lastLoket = null;

// tampilkan saat load
document.getElementById("loket1").innerText = loket1;
document.getElementById("loket2").innerText = loket2;

// fungsi next
function next(loket) {
    nomor++;

    if (loket == 1) {
        loket1 = nomor;
        document.getElementById("loket1").innerText = nomor;
        localStorage.setItem("loket1", nomor);
    } else {
        loket2 = nomor;
        document.getElementById("loket2").innerText = nomor;
        localStorage.setItem("loket2", nomor);
    }

    localStorage.setItem("nomor", nomor);

    document.getElementById("history").innerHTML =
        "Terakhir: Nomor " + nomor + " → Loket " + loket;

    // simpan terakhir
    lastNomor = nomor;
    lastLoket = loket;

    speak(nomor, loket);
}

// fungsi suara
function speak(no, loket) {
    let text = `Nomor antrian ${no}, silahkan ke loket ${loket}`;

    let speech = new SpeechSynthesisUtterance(text);
    speech.lang = "id-ID";
    speech.rate = 0.85;

    let voices = speechSynthesis.getVoices();
    let indoVoice = voices.find(v => v.lang.includes("id"));
    if (indoVoice) speech.voice = indoVoice;

    speechSynthesis.speak(speech);
}

// fungsi ulangi suara
function ulang() {
    if (lastNomor && lastLoket) {
        speak(lastNomor, lastLoket);
    } else {
        alert("Belum ada antrian yang dipanggil!");
    }
}

// reset data
function resetData() {
    if (confirm("Yakin ingin reset semua data?")) {
        localStorage.clear();
        location.reload();
    }
}

window.speechSynthesis.onvoiceschanged = () => {};
</script>

</body>
</html>
