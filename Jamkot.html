<script>
    // ======================= FIREBASE CONFIG (FIXED) =======================
    const firebaseConfig = {
        apiKey: "AIzaSyBfe6l1oz-oHEnIpExWf7L_c7WOVAQF2U",
        authDomain: "jamkot-73af5.firebaseapp.com",
        databaseURL: "https://jamkot-73af5-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "jamkot-73af5",
        storageBucket: "jamkot-73af5.firebasestorage.app",
        messagingSenderId: "920727142933",
        appId: "1:920727142933:web:2fe747a74d76873e61041c",
        measurementId: "G-93MKKF2F2B"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const dbRef = database.ref('kunjungan');

    // ======================= GLOBAL =======================
    let daftarData = [];
    let timerInterval = null;
    let antrianSuara = [];
    let sedangMemprosesSuara = false;
    let panggilanTerakhir = null;

    const DURASI_PERSIAPAN = 10;
    const DURASI_KUNJUNGAN = 60;

    // ======================= UTIL =======================
    function escapeHtml(str) {
        if (!str) return "";
        return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
    }

    function sisaWaktuPersiapan(item) {
        if (item.status !== 'persiapan') return 0;
        const elapsed = (Date.now() - item.waktuPersiapanMulai) / 1000;
        return Math.max(0, Math.floor(item.durasiPersiapan - elapsed));
    }

    function sisaWaktuKunjungan(item) {
        if (item.status !== 'berlangsung') return 0;
        const elapsed = (Date.now() - item.waktuMulai) / 1000;
        return Math.max(0, Math.floor(item.durasiKunjungan - elapsed));
    }

    // ======================= REALTIME STATUS UPDATE =======================
    function updateStatusBerdasarkanWaktu() {
        let berubah = false;

        daftarData.forEach((item, i) => {
            if (item.status === 'persiapan') {
                if (sisaWaktuPersiapan(item) <= 0) {
                    item.status = 'berlangsung';
                    item.waktuMulai = Date.now();
                    item.durasiKunjungan = DURASI_KUNJUNGAN;
                    berubah = true;
                }
            }

            else if (item.status === 'berlangsung') {
                if (sisaWaktuKunjungan(item) <= 0) {
                    item.status = 'selesai';
                    berubah = true;

                    tambahAntrianSuaraDuaKali(i, item.nama, item.wbp);
                    tampilkanNotifikasi(i, item);
                }
            }
        });

        if (berubah) simpanKeFirebase();
        tampilkanTabel();
    }

    function startGlobalTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(updateStatusBerdasarkanWaktu, 1000);
    }

    // ======================= FIREBASE REALTIME (FIXED) =======================
    function simpanKeFirebase() {
        // pakai SET array (aman setelah kita normalize listener)
        dbRef.set(daftarData);
        localStorage.setItem("dataKunjungan", JSON.stringify(daftarData));
    }

    function loadDariFirebase() {
        dbRef.on('value', (snapshot) => {
            const data = snapshot.val();

            if (data) {
                // FIX: object → array
                daftarData = Array.isArray(data)
                    ? data
                    : Object.values(data);
            } else {
                daftarData = [];
            }

            localStorage.setItem("dataKunjungan", JSON.stringify(daftarData));
            tampilkanTabel();
        });
    }

    // ======================= TAMBAH DATA (FIX REALTIME) =======================
    function tambahData() {
        let nama = document.getElementById("nama").value.trim();
        let wbp = document.getElementById("wbp").value.trim();

        if (!nama || !wbp) return alert("Form kosong!");
        if (daftarData.length >= 35) return alert("Maksimal 35 data!");

        const newItem = {
            nama,
            wbp,
            status: 'persiapan',
            waktuPersiapanMulai: Date.now(),
            durasiPersiapan: DURASI_PERSIAPAN,
            durasiKunjungan: DURASI_KUNJUNGAN
        };

        // 🔥 FIX UTAMA: push (bukan set array manual)
        dbRef.push(newItem);

        document.getElementById("nama").value = "";
        document.getElementById("wbp").value = "";
    }

    // ======================= DELETE =======================
    function hapusData(index) {
        if (confirm("Hapus data ini?")) {
            daftarData.splice(index, 1);
            simpanKeFirebase();
        }
    }

    function hapusSemuaData() {
        if (confirm("Hapus semua data?")) {
            daftarData = [];
            dbRef.remove(); // lebih bersih
            antrianSuara = [];
        }
    }

    // ======================= RENDER TABLE =======================
    function tampilkanTabel() {
        const tbody = document.getElementById("tabelData");
        tbody.innerHTML = "";

        daftarData.forEach((item, idx) => {
            let statusHtml = "";

            if (item.status === 'persiapan') {
                statusHtml = `⏳ PERSIAPAN (${sisaWaktuPersiapan(item)}s)`;
            } 
            else if (item.status === 'berlangsung') {
                let sisa = sisaWaktuKunjungan(item);
                statusHtml = `⏱️ ${Math.floor(sisa/60)}:${(sisa%60).toString().padStart(2,'0')}`;
            } 
            else {
                statusHtml = "✔ SELESAI";
            }

            tbody.innerHTML += `
                <tr>
                    <td>${idx+1}</td>
                    <td>${escapeHtml(item.nama)}</td>
                    <td>${escapeHtml(item.wbp)}</td>
                    <td>${statusHtml}</td>
                    <td><button onclick="hapusData(${idx})">Hapus</button></td>
                </tr>
            `;
        });
    }

    // ======================= INIT =======================
    window.onload = function() {
        loadDariFirebase();
        startGlobalTimer();
    };
</script>
