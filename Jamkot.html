<div class="main-container" id="mainContainer">
    <!-- HEADER: background gambar langsung, tanpa transparan, garis bawah tebal. Judul center sempurna -->

    <div class="form-area">
        <input type="text" id="nama" placeholder="👤 Nama Pengunjung" autocomplete="off">
        <input type="text" id="wbp" placeholder="🔒 Nama WBP / Tahanan" autocomplete="off">
        <div class="btn-group">
            <button onclick="tambahData()">➕ Tambahkan Antrian</button>
            <button class="btn-repeat-last" onclick="ulangiPanggilanTerakhir()" title="Ulangi panggilan suara untuk antrian terakhir yang selesai">🔁 Ulangi Panggilan Terakhir</button>

                    <th style="min-width: 180px;">Nama WBP/Tahanan</th>
                    <th style="min-width: 160px;"> Waktu / Status</th>
                    <th style="min-width: 110px;">⚙️ Aksi</th>
                </tr>
            </thead>
            <tbody id="tabelData"></tbody>
        </table>

<div id="notifikasi" style="display:none;"></div>

<script>
    let daftarData = JSON.parse(localStorage.getItem("dataKunjungan")) || [];
    const waktuAwal = 1;           // durasi kunjungan MENIT (demo 1 menit)
    let intervalTracker = [];
    
    // ANTRIAN SUARA (FIFO berdasarkan nomor urut)
    let antrianSuara = [];
    let sedangMemprosesSuara = false;

    // MENYIMPAN PANGGILAN TERAKHIR (untuk tombol ulang)
    let panggilanTerakhir = null;

    function simpanData() { localStorage.setItem("dataKunjungan", JSON.stringify(daftarData)); }

    function clearIntervalForIndex(index) { if (intervalTracker[index]) { clearInterval(intervalTracker[index]); intervalTracker[index] = null; } }

    function tampilkanTabel() {
        let tbody = document.getElementById("tabelData");
        tbody.innerHTML = "";
        daftarData.forEach((item, idx) => {
            let statusHtml = "";
            if (item.persiapan) {
                statusHtml = `<span class="hijau timer-badge">⏳ PERSIAPAN (${item.waktuPersiapan}s)</span>`;
            } 
            else if (item.selesai) {
                statusHtml = `<span class="merah timer-badge">✔️ SELESAI</span>`;
            } 
            else {
                let menit = Math.floor(item.waktu / 60);
                let detik = item.waktu % 60;
                let waktuTeks = `${menit}:${detik.toString().padStart(2,'0')}`;
                let warningClass = (item.waktu <= 10) ? "merah" : "";
                statusHtml = `<span class="timer-badge ${warningClass}" style="font-weight:bold;">⏱️ ${waktuTeks}</span>`;
            }
            tbody.innerHTML += `
                <tr>
                    <td style="font-weight:600;">${idx+1}</td>
                    <td>${escapeHtml(item.nama)}</td>
                    <td>${escapeHtml(item.wbp)}</td>
                    <td id="timer-${idx}">${statusHtml}</td>
                    <td><button class="btn-hapus-satu" onclick="hapusData(${idx})">🗑 Hapus</button></td>
                </tr>
            `;
        });
    }

    function escapeHtml(str) { if(!str) return ""; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

    function rebuildAllTimers() {
        for (let i = 0; i < intervalTracker.length; i++) if (intervalTracker[i]) clearInterval(intervalTracker[i]);
        intervalTracker = [];
        daftarData.forEach((item, index) => {
            if (!item.selesai) mulaiTimer(index);
        });
    }

    function playSuaraSekali(nomorUrut, nama, wbp) {
        return new Promise((resolve) => {
            let text = `Perhatian! Nomor antrian ${nomorUrut}, atas nama ${nama}, kunjungan untuk ${wbp}, waktu kunjungan telah habis. Silahkan Untuk bersiap-Siap meninggalkan ruangan kunjungan. Terimakasih.`;
            if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();
            let speech = new SpeechSynthesisUtterance(text);
            speech.lang = "id-ID";
            speech.rate = 0.88;
            speech.pitch = 1;
            speech.volume = 1;
            speech.onend = () => resolve();
            speech.onerror = () => resolve();
            window.speechSynthesis.speak(speech);
        });
    }

    function tambahAntrianSuaraDuaKali(index, nama, wbp) {
        const nomorUrut = index + 1;
        antrianSuara.push({ index, nama, wbp, nomorUrut });
        antrianSuara.push({ index, nama, wbp, nomorUrut });
        antrianSuara.sort((a, b) => a.nomorUrut - b.nomorUrut);
        panggilanTerakhir = { nomorUrut, nama, wbp, index };
        prosesAntrianSuara();
    }

    async function prosesAntrianSuara() {
        if (sedangMemprosesSuara) return;
        if (antrianSuara.length === 0) return;
        sedangMemprosesSuara = true;
        const item = antrianSuara.shift();
        await playSuaraSekali(item.nomorUrut, item.nama, item.wbp);
        await new Promise(r => setTimeout(r, 500));
        sedangMemprosesSuara = false;
        prosesAntrianSuara();
    }

    async function ulangiPanggilanTerakhir() {
        if (!panggilanTerakhir) {
            const lastSelesai = [...daftarData].reverse().find(item => item.selesai === true);
            if (lastSelesai) {
                const idx = daftarData.findIndex(item => item === lastSelesai);
                if (idx !== -1) {
                    panggilanTerakhir = { nomorUrut: idx+1, nama: lastSelesai.nama, wbp: lastSelesai.wbp, index: idx };
                } else {
                    alert("⚠️ Belum ada antrian yang selesai.");
                    return;
                }
            } else {
                alert("⚠️ Belum ada panggilan suara otomatis. Tambahkan antrian dan biarkan waktu kunjungan habis.");
                return;
            }
        }
        const btn = document.querySelector('.btn-repeat-last');
        if (btn) {
            btn.style.transform = "scale(0.96)";
            setTimeout(() => { if(btn) btn.style.transform = ""; }, 200);
        }
        await playSuaraSekali(panggilanTerakhir.nomorUrut, panggilanTerakhir.nama, panggilanTerakhir.wbp);
        let notifBox = document.getElementById("notifikasi");
        if (notifBox) {
            notifBox.innerHTML = `
                <div class="notif-modern" style="background: linear-gradient(135deg, #2d5f3e, #1e4a2f); border-left-color: #a3e635;">
                    <div class="notif-header"><span>🔊</span><strong>Panggilan Diulang</strong></div>
                    <div class="notif-content">
                        🧾 No. Antrian: <strong>${panggilanTerakhir.nomorUrut}</strong><br>
                        👤 ${escapeHtml(panggilanTerakhir.nama)} → 🔒 ${escapeHtml(panggilanTerakhir.wbp)}
                    </div>
                </div>
            `;
            notifBox.style.display = "block";
            setTimeout(() => { if (notifBox && notifBox.style.display === "block") notifBox.style.display = "none"; }, 3000);
        }
    }

    function tampilkanNotifikasi(index, data) {
        let notifBox = document.getElementById("notifikasi");
        if (!notifBox) return;
        notifBox.innerHTML = `
            <div class="notif-modern">
                <div class="notif-header"><span>⏰</span><strong>WAKTU KUNJUNGAN HABIS</strong></div>
                <div class="notif-content">
                    🧾 No. Antrian: <strong>${index+1}</strong><br>
                    👤 ${escapeHtml(data.nama)} → 🔒 ${escapeHtml(data.wbp)}
                    <div style="margin-top: 8px; font-size: 0.75rem;">🔔 Panggilan suara akan diulang 2 kali.</div>
                </div>
            </div>
        `;
        notifBox.style.display = "block";
        setTimeout(() => { if (notifBox) notifBox.style.display = "none"; }, 10000);
    }

    function tambahData() {
        let nama = document.getElementById("nama").value.trim();
        let wbp = document.getElementById("wbp").value.trim();
        if (!nama || !wbp) { alert("⚠️ Form tidak boleh kosong!"); return; }
        if (daftarData.length >= 35) { alert("⚠️ Antrian maksimal 35 data."); return; }
        daftarData.push({
            nama, wbp,
            waktu: waktuAwal,
            selesai: false,
            persiapan: true,
            waktuPersiapan: 10,
        });
        simpanData();
        tampilkanTabel();
        const newIndex = daftarData.length - 1;
        mulaiTimer(newIndex);
        document.getElementById("nama").value = "";
        document.getElementById("wbp").value = "";
    }

    function hapusData(index) {
        if (confirm(`❌ Hapus antrian untuk "${daftarData[index]?.nama}" ?`)) {
            clearIntervalForIndex(index);
            daftarData.splice(index, 1);
            rebuildAllTimers();
            simpanData();
            tampilkanTabel();
        }
    }

    function hapusSemuaData() {
        if (confirm("⚠️ Hapus SEMUA data?")) {
            for (let i = 0; i < intervalTracker.length; i++) if (intervalTracker[i]) clearInterval(intervalTracker[i]);
            intervalTracker = [];
            antrianSuara = [];
            sedangMemprosesSuara = false;
            panggilanTerakhir = null;
            daftarData = [];
            simpanData();
            tampilkanTabel();
        }
    }

    function mulaiTimer(index) {
        if (intervalTracker[index]) { clearInterval(intervalTracker[index]); intervalTracker[index] = null; }
        let data = daftarData[index];
        if (!data || data.selesai) return;

        const intervalId = setInterval(() => {
            if (!daftarData[index] || daftarData[index].selesai) {
                if (intervalTracker[index]) clearInterval(intervalTracker[index]);
                intervalTracker[index] = null;
                return;
            }

            let currentData = daftarData[index];
            let timerCell = document.getElementById(`timer-${index}`);

            if (currentData.persiapan) {
                if (currentData.waktuPersiapan > 0) {
                    currentData.waktuPersiapan--;
                    if (timerCell) timerCell.innerHTML = `<span class="hijau timer-badge">⏳ PERSIAPAN (${currentData.waktuPersiapan}s)</span>`;
                    simpanData();
                } else {
                    currentData.persiapan = false;
                    currentData.waktu = waktuAwal * 60;
                    simpanData();
                    if (timerCell) {
                        let menit = Math.floor(currentData.waktu / 60);
                        let detik = currentData.waktu % 60;
                        timerCell.innerHTML = `<span class="timer-badge">⏱️ ${menit}:${detik.toString().padStart(2,'0')}</span>`;
                    }
                }
                return;
            }

            if (currentData.waktu > 0 && !currentData.selesai) {
                currentData.waktu--;
                let menit = Math.floor(currentData.waktu / 60);
                let detik = currentData.waktu % 60;
                if (timerCell) {
                    let warningClass = (currentData.waktu <= 10) ? "merah" : "";
                    timerCell.innerHTML = `<span class="timer-badge ${warningClass}" style="font-weight:bold;">⏱️ ${menit}:${detik.toString().padStart(2,'0')}</span>`;
                }
                simpanData();
            } 
            else if (!currentData.selesai && currentData.waktu <= 0 && !currentData.persiapan) {
                clearInterval(intervalId);
                intervalTracker[index] = null;
                currentData.selesai = true;
                simpanData();
                if (timerCell) {
                    timerCell.innerHTML = `<span class="merah timer-badge">✔️ SELESAI</span>`;
                }
                tambahAntrianSuaraDuaKali(index, currentData.nama, currentData.wbp);
                tampilkanNotifikasi(index, currentData);
                tampilkanTabel();
            }
        }, 1000);
        intervalTracker[index] = intervalId;
    }

    function toggleFullscreen() {
        const container = document.getElementById("mainContainer");
        container.classList.toggle("fullscreen");
        const btn = document.getElementById("fullscreenBtn");
        if (container.classList.contains("fullscreen")) {
            btn.innerHTML = "🗗 Keluar Full Layar";
            btn.style.background = "#9b2c2c";
        } else {
            btn.innerHTML = "🖥️ Full Layar";
            btn.style.background = "#6b21a5";
        }
    }

    window.onload = function() {
        tampilkanTabel();
        for (let i = 0; i < daftarData.length; i++) {
            const item = daftarData[i];
            if (!item.selesai && item.persiapan && item.waktuPersiapan <= 0) {
                item.persiapan = false;
                item.waktu = waktuAwal * 60;
                simpanData();
            }
            if (!item.selesai && !item.persiapan && item.waktu <= 0) {
                item.selesai = true;
                simpanData();
                tambahAntrianSuaraDuaKali(i, item.nama, item.wbp);
            }
            if (!item.selesai) mulaiTimer(i);
        }

        const inputNama = document.getElementById("nama"), inputWbp = document.getElementById("wbp");
        function handleEnter(e) { if (e.key === 'Enter') { e.preventDefault(); tambahData(); } }
        inputNama.addEventListener("keypress", handleEnter);
        inputWbp.addEventListener("keypress", handleEnter);
    };
</script>
